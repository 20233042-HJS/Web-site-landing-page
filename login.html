<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - TIMO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="auth.css">

    <style>
        /* 역할 선택 토글 버튼 스타일 */
        .role-toggle {
            display: flex;
            background: #f0f0f0;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 24px;
            gap: 4px;
        }
        .role-toggle input[type="radio"] {
            display: none;
        }
        .role-toggle label {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #888;
            transition: all 0.2s;
            user-select: none;
        }
        .role-toggle input[type="radio"]:checked + label {
            background: #fff;
            color: #333;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
            font-weight: 700;
        }
    </style>
</head>

<body>
    <main>
        <div class="signup-container">
            <h2>로그인</h2>
            <p class="subtitle">TIMO 서비스 이용을 위해 로그인해주세요.</p>
            
            <form id="loginForm">

                <!-- 역할 선택 -->
                <div class="role-toggle">
                    <input type="radio" name="role" id="roleStudent" value="student" checked>
                    <label for="roleStudent">🎓 학생</label>
                    <input type="radio" name="role" id="roleProfessor" value="professor">
                    <label for="roleProfessor">👨‍🏫 교수</label>
                </div>

                <div class="input-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" placeholder="example@soongsil.ac.kr" required autocomplete="username">
                </div>
                
                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
                </div>
                
                <div id="errorMessage" class="error-message"></div>
                
                <button type="submit" class="submit-btn">로그인하기</button>

                <div class="signup-link">
                    아직 계정이 없으신가요? <a href="signup.html">회원가입</a>
                </div>
            </form>
        </div>
    </main>

    <script src="api.js"></script>
    <script src="login.js"></script>
</body>
</html>
