<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMO - 학생 대시보드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── 헤더 ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 40px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3498db, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .badge {
            background: rgba(52,152,219,0.15);
            border: 1px solid rgba(52,152,219,0.3);
            color: #3498db;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3498db, #9b59b6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: white;
        }

        /* ── 메인 레이아웃 ── */
        .dashboard {
            flex: 1;
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            grid-template-rows: 1fr auto;
            gap: 20px;
            padding: 28px 40px;
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }

        /* ── 공통 카드 ── */
        .card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }

        .card-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 18px;
        }

        /* ── 왼쪽: 팀 링크 ── */
        .link-panel {
            grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        .team-card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 18px 20px;
            transition: border-color 0.2s, transform 0.2s;
            cursor: pointer;
            text-decoration: none;
            display: block;
            color: inherit;
        }

        .team-card:hover {
            border-color: rgba(52,152,219,0.4);
            background: rgba(52,152,219,0.08);
            transform: translateX(3px);
        }

        .team-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .team-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #e2e8f0;
        }

        .team-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
        }

        .link-chips {
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
        }

        .link-chip {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .chip-github {
            background: rgba(30,30,30,0.8);
            color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chip-github:hover { background: #24292e; color: #fff; }

        .chip-figma {
            background: rgba(162,93,220,0.15);
            color: #c084fc;
            border: 1px solid rgba(162,93,220,0.25);
        }
        .chip-figma:hover { background: rgba(162,93,220,0.3); color: #fff; }

        .chip-notion {
            background: rgba(255,255,255,0.06);
            color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chip-notion:hover { background: rgba(255,255,255,0.12); color: #fff; }

        /* ── 중앙: 매칭 ── */
        .match-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .match-hero {
            flex: 1;
            min-height: 260px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            text-align: center;
        }

        .match-hero::before {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(52,152,219,0.12) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .match-hero-label {
            font-size: 0.8rem;
            color: #64748b;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .match-hero h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e2e8f0;
            line-height: 1.4;
        }

        .match-hero h2 span {
            background: linear-gradient(135deg, #3498db, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-match {
            padding: 14px 40px;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #3498db, #9b59b6);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(52,152,219,0.35);
            transition: all 0.3s;
            position: relative;
            z-index: 1;
        }

        .btn-match:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(52,152,219,0.5);
        }

        .btn-match:active { transform: translateY(-1px); }

        /* 내 팀 현황 미니카드 */
        .my-team-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 22px;
        }

        .my-team-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(52,152,219,0.2), rgba(155,89,182,0.2));
            border: 1px solid rgba(52,152,219,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .my-team-info p {
            font-size: 0.82rem;
            color: #64748b;
            margin-bottom: 3px;
        }

        .my-team-info strong {
            font-size: 1rem;
            color: #e2e8f0;
            font-weight: 700;
        }

        /* ── 오른쪽: 프로필 + Q&A ── */
        .right-panel {
            grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 프로필 카드 */
        .profile-card {
            padding: 24px;
            text-align: center;
        }

        .profile-photo {
            width: 72px;
            height: 90px;
            background: linear-gradient(135deg, #1e293b, #334155);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .profile-name {
            font-size: 1.05rem;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 6px;
        }

        .profile-tags {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .profile-tag {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 6px;
            background: rgba(52,152,219,0.12);
            border: 1px solid rgba(52,152,219,0.2);
            color: #7dd3fc;
        }

        /* Q&A 패널 */
        .qna-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding: 20px;
        }

        .qna-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .qna-top h4 {
            font-size: 0.85rem;
            font-weight: 700;
            color: #e2e8f0;
        }

        .btn-write {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 8px;
            background: linear-gradient(135deg, #3498db, #9b59b6);
            color: white;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-write:hover { opacity: 0.85; }

        /* 글 작성 폼 */
        #writeView { display: none; }

        .qna-form-input,
        .qna-form-textarea {
            width: 100%;
            background: rgba(15,23,42,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #e2e8f0;
            padding: 10px 12px;
            font-size: 0.82rem;
            margin-bottom: 8px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
            box-sizing: border-box;
        }
        .qna-form-input:focus,
        .qna-form-textarea:focus {
            border-color: rgba(52,152,219,0.5);
        }
        .qna-form-input::placeholder,
        .qna-form-textarea::placeholder { color: #475569; }

        .qna-form-textarea {
            height: 70px;
            resize: none;
        }

        .qna-form-btns {
            display: flex;
            gap: 7px;
            justify-content: flex-end;
        }

        .btn-cancel {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); }

        .btn-submit {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 8px;
            background: linear-gradient(135deg, #3498db, #9b59b6);
            color: white;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-submit:hover { opacity: 0.85; }

        /* 질문 목록 */
        .question-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 2px;
        }

        .question-list::-webkit-scrollbar { width: 4px; }
        .question-list::-webkit-scrollbar-track { background: transparent; }
        .question-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        .q-item {
            background: rgba(15,23,42,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 12px 14px;
            transition: border-color 0.2s;
        }
        .q-item:hover { border-color: rgba(52,152,219,0.2); }

        .q-title {
            font-size: 0.82rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .q-content {
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .q-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .q-date {
            font-size: 0.68rem;
            color: #475569;
        }

        .btn-like {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 6px;
            background: rgba(225,29,72,0.1);
            border: 1px solid rgba(225,29,72,0.15);
            color: #fb7185;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-like:hover { background: rgba(225,29,72,0.2); }

        /* ── 하단: 진행률 ── */
        .progress-bar-panel {
            grid-column: 2 / 3;
            padding: 20px 28px;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .progress-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #64748b;
            letter-spacing: 0.5px;
            white-space: nowrap;
            text-transform: uppercase;
        }

        .progress-items {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .progress-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-team-name {
            font-size: 0.78rem;
            font-weight: 600;
            color: #94a3b8;
            width: 28px;
        }

        .progress-track {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.6s ease;
        }

        .fill-1 { background: linear-gradient(90deg, #3498db, #60a5fa); }
        .fill-2 { background: linear-gradient(90deg, #9b59b6, #c084fc); }
        .fill-3 { background: linear-gradient(90deg, #22c55e, #86efac); }
        .fill-4 { background: linear-gradient(90deg, #f59e0b, #fcd34d); }

        .progress-pct {
            font-size: 0.72rem;
            font-weight: 700;
            color: #64748b;
            width: 28px;
            text-align: right;
        }
    </style>
</head>
<body>

    <!-- 헤더 -->
    <header>
        <div class="logo">TIMO</div>
        <div class="header-right">
            <span class="badge">🎓 학생</span>
            <div class="avatar">홍</div>
        </div>
    </header>

    <div class="dashboard">

        <!-- ── 왼쪽: 팀 링크 ── -->
        <div class="link-panel">
            <div class="card-title" style="padding-left:4px;">팀 링크 모음</div>

            <a href="team.html?team=1" class="team-card">
                <div class="team-card-header">
                    <span class="team-name">1조</span>
                    <span class="team-dot"></span>
                </div>
                <div class="link-chips">
                    <span class="link-chip chip-github">GitHub</span>
                    <span class="link-chip chip-figma">Figma</span>
                    <span class="link-chip chip-notion">Notion</span>
                </div>
            </a>

            <a href="team.html?team=2" class="team-card">
                <div class="team-card-header">
                    <span class="team-name">2조</span>
                    <span class="team-dot"></span>
                </div>
                <div class="link-chips">
                    <span class="link-chip chip-github">GitHub</span>
                    <span class="link-chip chip-figma">Figma</span>
                    <span class="link-chip chip-notion">Notion</span>
                </div>
            </a>

            <a href="team.html?team=3" class="team-card">
                <div class="team-card-header">
                    <span class="team-name">3조</span>
                    <span class="team-dot"></span>
                </div>
                <div class="link-chips">
                    <span class="link-chip chip-github">GitHub</span>
                    <span class="link-chip chip-figma">Figma</span>
                    <span class="link-chip chip-notion">Notion</span>
                </div>
            </a>

            <a href="team.html?team=4" class="team-card">
                <div class="team-card-header">
                    <span class="team-name">4조</span>
                    <span class="team-dot"></span>
                </div>
                <div class="link-chips">
                    <span class="link-chip chip-github">GitHub</span>
                    <span class="link-chip chip-figma">Figma</span>
                    <span class="link-chip chip-notion">Notion</span>
                </div>
            </a>
        </div>

        <!-- ── 중앙: 매칭 ── -->
        <div class="match-panel">
            <div class="card match-hero">
                <div class="match-hero-label">AI Team Matching</div>
                <h2>최적의 <span>팀원</span>을<br>찾아드릴게요</h2>
                <button class="btn-match">팀 매칭 결과 보기</button>
            </div>

            <div class="card my-team-card">
                <div class="my-team-icon">👥</div>
                <div class="my-team-info">
                    <p>내 현황</p>
                    <strong>1조 · 미배정 · 2주차</strong>
                </div>
            </div>
        </div>

        <!-- ── 오른쪽: 프로필 + Q&A ── -->
        <div class="right-panel">
            <div class="card profile-card">
                <div class="profile-photo">🧑‍💻</div>
                <div class="profile-name">홍길동</div>
                <div style="font-size:0.78rem; color:#64748b; margin: 4px 0 10px;">honggildong@soongsil.ac.kr</div>
                <div class="profile-tags">
                    <span class="profile-tag">1조</span>
                    <span class="profile-tag">미배정</span>
                    <span class="profile-tag">2주차</span>
                </div>
            </div>

            <div class="card qna-panel">
                <div class="qna-top">
                    <h4>💬 질문 게시판</h4>
                    <button class="btn-write" onclick="toggleWriteForm(true)">✍️ 작성</button>
                </div>

                <!-- 작성 폼 -->
                <div id="writeView">
                    <form id="questionForm">
                        <input class="qna-form-input" type="text" id="title" placeholder="제목을 입력하세요" required>
                        <textarea class="qna-form-textarea" id="content" placeholder="질문 내용을 입력하세요" required></textarea>
                        <div class="qna-form-btns">
                            <button type="button" class="btn-cancel" onclick="toggleWriteForm(false)">취소</button>
                            <button type="submit" class="btn-submit">등록하기</button>
                        </div>
                    </form>
                </div>

                <!-- 질문 목록 -->
                <div id="boardView">
                    <div id="questionList" class="question-list">
                        <!-- JS로 채워짐 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- ── 하단: 진행률 ── -->
        <div class="card progress-bar-panel">
            <span class="progress-label">팀 진행률</span>
            <div class="progress-items">
                <div class="progress-row">
                    <span class="progress-team-name">1조</span>
                    <div class="progress-track"><div id="fill-1" class="progress-fill fill-1" style="width:0%"></div></div>
                    <span id="pct-1" class="progress-pct">0%</span>
                </div>
                <div class="progress-row">
                    <span class="progress-team-name">2조</span>
                    <div class="progress-track"><div id="fill-2" class="progress-fill fill-2" style="width:0%"></div></div>
                    <span id="pct-2" class="progress-pct">0%</span>
                </div>
                <div class="progress-row">
                    <span class="progress-team-name">3조</span>
                    <div class="progress-track"><div id="fill-3" class="progress-fill fill-3" style="width:0%"></div></div>
                    <span id="pct-3" class="progress-pct">0%</span>
                </div>
                <div class="progress-row">
                    <span class="progress-team-name">4조</span>
                    <div class="progress-track"><div id="fill-4" class="progress-fill fill-4" style="width:0%"></div></div>
                    <span id="pct-4" class="progress-pct">0%</span>
                </div>
            </div>
        </div>

    </div>

    <script src="api.js"></script>
    <script src="board.js"></script>
    <script>
        function toggleWriteForm(show) {
            document.getElementById('writeView').style.display = show ? 'block' : 'none';
            document.getElementById('boardView').style.display = show ? 'none' : 'block';
        }

        // ── 진행도 업데이트 ──
        async function loadAllProgress() {
            try {
                const res = await fetch('${API_BASE}/api/progress/all');
                if (!res.ok) return;
                const data = await res.json(); // { '1': 2, '2': 8, ... }

                [1, 2, 3, 4].forEach(n => {
                    const pct = data[String(n)] ?? 0;
                    const fill = document.getElementById(`fill-${n}`);
                    const label = document.getElementById(`pct-${n}`);
                    if (fill)  fill.style.width = `${pct}%`;
                    if (label) label.textContent = `${pct}%`;
                });
            } catch (err) {
                console.error('진행도 로드 실패:', err);
            }
        }

        // 페이지 로드 시 + 10초마다 갱신
        document.addEventListener('DOMContentLoaded', () => {
            loadAllProgress();
            setInterval(loadAllProgress, 10000);
        });
    </script>
</body>
</html>
